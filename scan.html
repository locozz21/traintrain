<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KORAIL - 승차권 검표 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --korail-blue: #0054A6;
            --bg-dark: #111827;
            --border-color: #374151;
            --success-green: #10B981;
            --error-red: #EF4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Noto Sans KR", sans-serif;
            background-color: var(--bg-dark);
            color: #FFFFFF;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .header {
            width: 100%;
            padding: 15px 0;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            background-color: #1F2937;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        /* QR 스캐너 뷰포트 영역 */
        .scanner-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            max-width: 420px;
        }

        .scan-helper-text {
            font-size: 14px;
            color: #9CA3AF;
            margin-bottom: 20px;
            text-align: center;
            z-index: 10;
        }

        /* QR 인식 영역 및 실제 카메라 화면이 띄워지는 컨테이너 */
        .qr-window {
            position: relative;
            width: 250px;
            height: 250px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background-color: #000000;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            overflow: hidden;
        }

        /* [실제 카메라 비디오 태그] */
        #camera-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 테두리 모서리 강조 표시 (ㄱ, ㄴ, ㄷ, ㄹ) */
        .corner {
            position: absolute;
            width: 24px;
            height: 24px;
            border-color: var(--korail-blue);
            border-style: solid;
            pointer-events: none;
            z-index: 5;
        }
        .top-left {
            top: -2px;
            left: -2px;
            border-width: 4px 0 0 4px; /* ㄱ */
        }
        .top-right {
            top: -2px;
            right: -2px;
            border-width: 4px 4px 0 0; /* ㄲ */
        }
        .bottom-left {
            bottom: -2px;
            left: -2px;
            border-width: 0 0 4px 4px; /* ㄴ */
        }
        .bottom-right {
            bottom: -2px;
            right: -2px;
            border-width: 0 4px 4px 0; /* ┘ */
        }

        /* 통합 진행상황/결과 노출 오버레이 레이어 */
        .status-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(17, 24, 39, 0.95);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 로딩 동그라미 스피너 */
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--korail-blue);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        /* 결과 정보창 디자인 */
        .info-card {
            background-color: #1F2937;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 320px;
            margin-bottom: 25px;
            box-sizing: border-box;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label {
            color: #9CA3AF;
        }

        .info-value {
            font-weight: bold;
            color: #FFFFFF;
        }

        .btn-confirm {
            width: 100%;
            max-width: 320px;
            padding: 15px;
            background-color: var(--korail-blue);
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 가상 테스트용 하단 입력 창 */
        .test-panel {
            width: 100%;
            max-width: 420px;
            background-color: #1F2937;
            padding: 15px;
            box-sizing: border-box;
            border-top: 1px solid var(--border-color);
            text-align: center;
            z-index: 10;
        }

        .test-input {
            width: calc(100% - 30px);
            padding: 10px;
            background-color: #111827;
            border: 1px solid var(--border-color);
            color: #FFFFFF;
            font-size: 12px;
            outline: none;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .test-btn {
            background-color: #374151;
            color: #FFFFFF;
            border: none;
            padding: 8px 15px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
        }
        .test-btn:hover {
            background-color: var(--korail-blue);
        }
    </style>
</head>
<body>

<div class="header">검표원 QR 스캐너</div>

<div class="scanner-container">
    <div class="scan-helper-text">스마트폰의 승차권 QR코드를<br>네모 테두리 화면 중앙에 맞추어 주세요.</div>
    
    <div class="qr-window">
        <video id="camera-preview" autoplay playsinline muted></video>

        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
    </div>
</div>

<div class="test-panel">
    <input type="text" class="test-input" id="test-qr-data" placeholder="여기에 스마트폰에 노출된 암호문 값을 붙여넣으세요">
    <div>
        <button class="test-btn" onclick="triggerTestScan(true)">가상 인식 시도</button>
        <button class="test-btn" style="background-color: #7F1D1D;" onclick="triggerTestScan(false)">오류 티켓 강제 테스트</button>
    </div>
</div>

<div class="status-overlay" id="overlay">
    <div id="loading-view" style="display: flex; flex-direction: column; align-items: center;">
        <div class="spinner"></div>
        <div class="status-title">QR코드를 해석하여 정보를 조회 중입니다...</div>
    </div>

    <div id="result-view" style="display: none; width: 100%; flex-direction: column; align-items: center;">
        <div class="status-title" id="result-title">정상입니다</div>
        
        <div class="info-card">
            <div class="info-row">
                <span class="info-label">탑승객 명의</span>
                <span class="info-value" id="res-name">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">구간 정보</span>
                <span class="info-value" id="res-route">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">호차 / 좌석</span>
                <span class="info-value" id="res-seat">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">발행 검증시간</span>
                <span class="info-value" style="font-size: 11px;" id="res-time">-</span>
            </div>
        </div>

        <button class="btn-confirm" onclick="resetScanner()">확인 (스캐너 복귀)</button>
    </div>
</div>

<script>
    const SECRET_KEY = "KorailSecuritySystemKey2026";
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // 스마트폰 카메라 구동 기능 활성화
    async function initCamera() {
        const video = document.getElementById('camera-preview');
        try {
            // 후면 카메라 우선 활성화 조건 설정
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" },
                audio: false
            });
            video.srcObject = stream;
        } catch (err) {
            console.warn("카메라 장치를 시작할 수 없습니다. 가상 테스트 모드는 정상 작동합니다.", err);
            // 브라우저가 보안상(https가 아닌 localhost/http 환경 등) 거부했거나 카메라가 없는 환경일 때의 대응
        }
    }

    // 단일 비프음 (삑) 재생 함수
    function playBeep(frequency, duration) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = frequency;
        osc.type = "sine";
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // 에러 비프음 (삑삑삑) 재생 함수
    function playErrorBeep() {
        playBeep(450, 0.12);
        setTimeout(() => playBeep(450, 0.12), 200);
        setTimeout(() => playBeep(400, 0.25), 400);
    }

    // 가상 QR 리딩 트리거 함수
    function triggerTestScan(isNormalMode) {
        const encryptedInput = document.getElementById('test-qr-data').value.trim();

        if (isNormalMode && !encryptedInput) {
            alert("티켓 화면(ticket.html)에서 생성된 QR 복사값 혹은 암호문 텍스트를 입력해 주세요.");
            return;
        }

        // 1. 인식 성공음 (삑) 출력
        playBeep(980, 0.15);

        // 2. 오버레이를 열고 조회중... 로딩 모드 활성화
        const overlay = document.getElementById('overlay');
        const loadingView = document.getElementById('loading-view');
        const resultView = document.getElementById('result-view');

        overlay.style.display = 'flex';
        loadingView.style.display = 'flex';
        resultView.style.display = 'none';

        // 3. 3초간 조회 대기 시작
        setTimeout(() => {
            loadingView.style.display = 'none';
            resultView.style.display = 'flex';

            if (isNormalMode) {
                try {
                    const decryptedBytes = CryptoJS.AES.decrypt(encryptedInput, SECRET_KEY);
                    const decryptedText = decryptedBytes.toString(CryptoJS.enc.Utf8);

                    if (!decryptedText) throw new Error("복호화 정보 실패");

                    const [name, route, seat, timestamp] = decryptedText.split('|');
                    
                    const issuedTime = parseInt(timestamp);
                    const now = Date.now();
                    const diffSeconds = Math.floor((now - issuedTime) / 1000);

                    // 보안상 30초 유효 시간 초과 판단
                    if (diffSeconds > 30 || diffSeconds < -30) {
                        triggerErrorScreen("보안 시간 만료 (30초 만료된 QR)");
                        return;
                    }

                    // 모든 유효성 검증 성공
                    document.getElementById('result-title').innerText = "✓ 정상 승차권입니다";
                    document.getElementById('result-title').style.color = "var(--success-green)";
                    document.getElementById('res-name').innerText = name;
                    document.getElementById('res-route').innerText = route;
                    document.getElementById('res-seat').innerText = seat;
                    document.getElementById('res-time').innerText = new Date(issuedTime).toLocaleString();

                } catch (e) {
                    triggerErrorScreen("위조되거나 변조된 잘못된 QR코드");
                }
            } else {
                triggerErrorScreen("잘못된 승차권 정보");
            }
        }, 3000); // 3초 조회 대기 로직 적용
    }

    function triggerErrorScreen(errorMessage) {
        playErrorBeep();

        document.getElementById('result-title').innerText = "✗ 잘못된 QR코드입니다";
        document.getElementById('result-title').style.color = "var(--error-red)";
        document.getElementById('res-name').innerText = "검증 불가";
        document.getElementById('res-route').innerText = errorMessage;
        document.getElementById('res-seat').innerText = "탑승 불가";
        document.getElementById('res-time').innerText = "기록 없음";
    }

    function resetScanner() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('test-qr-data').value = '';
    }

    // 페이지 시작과 동시에 카메라 초기 구동 시도
    window.onload = function() {
        initCamera();
    };
</script>
</body>
</html>
