<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KORAIL - 승차권 검표 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --korail-blue: #0054A6;
            --bg-dark: #111827;
            --border-color: #374151;
            --success-green: #10B981;
            --error-red: #EF4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Noto Sans KR", sans-serif;
            background-color: var(--bg-dark);
            color: #FFFFFF;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .header {
            width: 100%;
            padding: 15px 0;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            background-color: #1F2937;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .scanner-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            max-width: 420px;
        }

        .scan-helper-text {
            font-size: 14px;
            color: #9CA3AF;
            margin-bottom: 20px;
            text-align: center;
            z-index: 10;
        }

        .qr-window {
            position: relative;
            width: 250px;
            height: 250px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background-color: #000000;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            overflow: hidden;
        }

        #reader {
            width: 100%;
            height: 100%;
        }

        #reader video {
            object-fit: cover !important;
        }

        .corner {
            position: absolute;
            width: 24px;
            height: 24px;
            border-color: var(--korail-blue);
            border-style: solid;
            pointer-events: none;
            z-index: 5;
        }
        .top-left { top: -2px; left: -2px; border-width: 4px 0 0 4px; }
        .top-right { top: -2px; right: -2px; border-width: 4px 4px 0 0; }
        .bottom-left { bottom: -2px; left: -2px; border-width: 0 0 4px 4px; }
        .bottom-right { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; }

        .status-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(17, 24, 39, 0.96);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .close-overlay-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 35px;
            font-weight: bold;
            color: #9CA3AF;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 1010;
        }

        .close-overlay-btn:hover {
            color: #FFFFFF;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--korail-blue);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0 { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        /* 상세 정보 카드 (성공시에만 노출) */
        .info-card {
            background-color: #1F2937;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 320px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        /* 오류 메세지 단독 표시용 상자 (실패시에만 노출) */
        .error-message-box {
            display: none;
            color: var(--error-red);
            font-size: 18px;
            font-weight: bold;
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error-red);
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label { color: #9CA3AF; }
        .info-value { font-weight: bold; color: #FFFFFF; }

        .auto-close-timer {
            font-size: 14px;
            color: #9CA3AF;
            margin-top: 10px;
        }

        .test-panel {
            width: 100%;
            max-width: 420px;
            background-color: #1F2937;
            padding: 15px;
            box-sizing: border-box;
            border-top: 1px solid var(--border-color);
            text-align: center;
            z-index: 10;
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .test-input {
            flex: 1;
            padding: 12px;
            background-color: #111827;
            border: 1px solid var(--border-color);
            color: #FFFFFF;
            font-size: 13px;
            outline: none;
            border-radius: 6px;
        }

        .action-btn {
            padding: 0 15px;
            background-color: var(--korail-blue);
            color: #FFFFFF;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }

        .audio-guide-banner {
            background-color: #3B82F6;
            color: white;
            font-size: 11px;
            padding: 4px;
            width: 100%;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="audio-guide-banner" id="audio-banner">⚠️ 소리가 작동하지 않으면 화면을 가볍게 한 번 터치해 주세요!</div>
<div class="header">검표원 QR 스캐너</div>

<div class="scanner-container">
    <div class="scan-helper-text">스마트폰의 승차권 QR코드를<br>네모 테두리 화면 중앙에 맞추어 주세요.</div>
    
    <div class="qr-window">
        <div id="reader"></div>
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
    </div>
</div>

<div class="test-panel">
    <div class="input-row">
        <input type="text" class="test-input" id="test-qr-data" placeholder="암호화된 문자열을 복사해 넣으세요">
        <button class="action-btn" onclick="handleManualVerify()">검증</button>
    </div>
</div>

<div class="status-overlay" id="overlay">
    <span class="close-overlay-btn" onclick="resetScanner()">&times;</span>

    <div id="loading-view" style="display: flex; flex-direction: column; align-items: center;">
        <div class="spinner"></div>
        <div class="status-title">승차권 검증 중입니다...</div>
    </div>

    <div id="result-view" style="display: none; width: 100%; flex-direction: column; align-items: center;">
        <div class="status-title" id="result-title">정상 승차권</div>
        
        <div class="info-card" id="success-card">
            <div class="info-row">
                <span class="info-label">탑승객 명의</span>
                <span class="info-value" id="res-name">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">구간 정보</span>
                <span class="info-value" id="res-route">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">호차 / 좌석</span>
                <span class="info-value" id="res-seat">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">발행 검증시간</span>
                <span class="info-value" style="font-size: 11px;" id="res-time">-</span>
            </div>
        </div>

        <div class="error-message-box" id="error-card">
            오류 원인이 표시됩니다.
        </div>

        <div class="auto-close-timer" id="timer-text">5초 후 스캐너로 복귀합니다...</div>
    </div>
</div>

<script>
    const SECRET_KEY = "KorailSecuritySystemKey2026";
    let audioCtx = null;
    let html5QrcodeScanner = null;
    let autoCloseTimeout = null;
    let autoCloseInterval = null;
    
    // [중요] 연속 스캔 중복 제어용 플래그
    let isProcessing = false;

    // [중복 방지] 승차 처리 완료 티켓 저장소
    const usedTickets = new Set();

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    document.body.addEventListener('click', function() {
        initAudio();
        document.getElementById('audio-banner').style.display = 'none';
    }, { once: false });

    function startCameraScanner() {
        html5QrcodeScanner = new Html5Qrcode("reader");
        const config = { 
            fps: 10, 
            qrbox: { width: 250, height: 250 } 
        };

        html5QrcodeScanner.start(
            { facingMode: "environment" }, 
            config,
            onScanSuccess
        ).catch(err => {
            console.warn("카메라 감지 오류", err);
        });
    }

    // 1. QR코드 스캔 성공 시 핸들러 수정
    function onScanSuccess(decodedText) {
        if (isProcessing) return; // 이미 처리 중이면 연속된 입력은 완전히 무시
        
        isProcessing = true; // 플래그 락(Lock)
        
        // 카메라 스캔 일시정지 (스캔 기능 물리적 정지)
        if (html5QrcodeScanner) {
            html5QrcodeScanner.pause(true);
        }

        clearAllTimers();

        // [요청 사항] 인식을 확실히 인지할 수 있도록 1초(1000ms)의 대기 딜레이를 부여한 후 처리
        setTimeout(() => {
            processVerification(decodedText);
        }, 1000);
    }

    function handleManualVerify() {
        if (isProcessing) return;
        isProcessing = true;
        
        initAudio();
        const inputData = document.getElementById('test-qr-data').value.trim();
        if (!inputData) {
            alert("암호화된 문자열을 입력해 주세요.");
            isProcessing = false;
            return;
        }
        
        if (html5QrcodeScanner) {
            html5QrcodeScanner.pause(true);
        }

        clearAllTimers();
        
        // 수동 검증도 일치된 흐름을 위해 1초 딜레이 적용
        setTimeout(() => {
            processVerification(inputData);
        }, 1000);
    }

    // 1500Hz 방형파 재생기
    function playSharpBeep(frequency, duration) {
        try {
            initAudio();
            if (!audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime); 
            osc.type = "square"; 
            
            // 크고 날카로운 소리를 위한 볼륨 조정
            gainNode.gain.setValueAtTime(0.6, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch (e) {
            console.warn("소리 출력 제약 발생", e);
        }
    }

    // 정상: 초고음 방형파 1500Hz "띡" (1회)
    function playSuccessBeep() {
        playSharpBeep(1500, 0.08);
    }

    // 실패: 동일 주파수 1500Hz 고속 2연타 "띡띡" (2회)
    function playErrorBeep() {
        playSharpBeep(1500, 0.07);
        setTimeout(() => playSharpBeep(1500, 0.07), 110);
    }

    function clearAllTimers() {
        if (autoCloseTimeout) clearTimeout(autoCloseTimeout);
        if (autoCloseInterval) clearInterval(autoCloseInterval);
    }

    function processVerification(encryptedInput) {
        const overlay = document.getElementById('overlay');
        const loadingView = document.getElementById('loading-view');
        const resultView = document.getElementById('result-view');

        overlay.style.display = 'flex';
        loadingView.style.display = 'flex';
        resultView.style.display = 'none';

        // 분석 애니메이션 딜레이
        setTimeout(() => {
            loadingView.style.display = 'none';
            resultView.style.display = 'flex';

            const successCard = document.getElementById('success-card');
            const errorCard = document.getElementById('error-card');

            try {
                // 중복 사용 제어
                if (usedTickets.has(encryptedInput)) {
                    showErrorResult("이미 사용 처리된 승차권입니다.");
                    startAutoCloseTimer();
                    return;
                }

                const decryptedBytes = CryptoJS.AES.decrypt(encryptedInput, SECRET_KEY);
                const decryptedText = decryptedBytes.toString(CryptoJS.enc.Utf8);

                if (!decryptedText) throw new Error("위조 에러");

                const [name, route, seat, timestamp] = decryptedText.split('|');
                
                const issuedTime = parseInt(timestamp);
                const now = Date.now();
                const diffSeconds = Math.floor((now - issuedTime) / 1000);

                // 유효시간 30초 검증
                if (diffSeconds > 30 || diffSeconds < -30) {
                    showErrorResult("보안 유효 시간 초과 (30초 만료)");
                    startAutoCloseTimer();
                    return;
                }

                // [검증 정상]
                playSuccessBeep();
                usedTickets.add(encryptedInput); // 사용 완료 목록 등록

                successCard.style.display = "block";
                errorCard.style.display = "none";

                document.getElementById('result-title').innerText = "✓ 정상 승차권입니다";
                document.getElementById('result-title').style.color = "var(--success-green)";
                document.getElementById('res-name').innerText = name;
                document.getElementById('res-route').innerText = route;
                document.getElementById('res-seat').innerText = seat;
                document.getElementById('res-time').innerText = new Date(issuedTime).toLocaleString();

            } catch (e) {
                // [검증 실패]
                showErrorResult("조회 불가 (유효하지 않은 QR코드)");
            }

            // 공통 5초 타이머 시작
            startAutoCloseTimer();
        }, 600); 
    }

    // 오류 발생 화면 세팅 함수 (카드 삭제 및 띡띡 소리)
    function showErrorResult(errorMessage) {
        playErrorBeep(); // 방형파 1500Hz 2회 출력

        const successCard = document.getElementById('success-card');
        const errorCard = document.getElementById('error-card');

        // 레이아웃 스위칭
        successCard.style.display = "none";
        errorCard.style.display = "block";
        errorCard.innerText = errorMessage;

        document.getElementById('result-title').innerText = "✗ 검증 불가";
        document.getElementById('result-title').style.color = "var(--error-red)";
    }

    function startAutoCloseTimer() {
        clearAllTimers();
        
        let remainingSeconds = 5;
        document.getElementById('timer-text').innerText = `${remainingSeconds}초 후 스캐너로 복귀합니다...`;

        autoCloseInterval = setInterval(() => {
            remainingSeconds--;
            document.getElementById('timer-text').innerText = `${remainingSeconds}초 후 스캐너로 복귀합니다...`;
        }, 1000);

        autoCloseTimeout = setTimeout(() => {
            resetScanner();
        }, 5000);
    }

    function resetScanner() {
        clearAllTimers();
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('test-qr-data').value = '';
        
        // 처리 플래그 잠금 해제 및 카메라 스캔 재시작
        isProcessing = false;
        if (html5QrcodeScanner) {
            html5QrcodeScanner.resume();
        }
    }

    window.onload = function() {
        startCameraScanner();
    };
</script>
</body>
</html>
