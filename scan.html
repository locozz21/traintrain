<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KORAIL - 승무원 검수 단말기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --korail-blue: #0054A6;
            --korail-green: #1F873C;
            --korail-red: #E71E2D;
            --bg-dark: #111827;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
            background-color: var(--bg-dark);
            color: #FFFFFF;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #reader span, #reader a, #reader div:not([id]) {
            display: none !important;
        }

        .header {
            width: 100%;
            background-color: #030712;
            padding: 18px 0;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            border-bottom: 2px solid var(--korail-blue);
            z-index: 10;
        }

        .scanner-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            justify-content: center;
        }

        .camera-box {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #000000;
            border-radius: 16px;
            overflow: hidden;
            border: 3px solid #374151;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #reader {
            width: 100% !important;
            height: 100% !important;
        }
        #reader video {
            object-fit: cover !important;
        }

        .loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            color: #9CA3AF;
            pointer-events: none;
            z-index: 1;
        }

        .verified-card {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 5%;
            width: 90%;
            max-width: 380px;
            background-color: var(--card-bg);
            color: #333333;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 2px solid var(--korail-green);
            overflow: hidden;
            z-index: 1000;
        }

        .invalid-card {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 5%;
            width: 90%;
            max-width: 380px;
            background-color: var(--card-bg);
            color: #333333;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 2px solid var(--korail-red);
            overflow: hidden;
            z-index: 1000;
        }

        .card-banner {
            background-color: var(--korail-green);
            color: #FFFFFF;
            padding: 14px;
            font-weight: bold;
            font-size: 15px;
            text-align: center;
        }

        .card-banner.danger {
            background-color: var(--korail-red);
        }

        .card-body {
            padding: 20px;
        }

        .route-display {
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 15px;
            color: #111111;
            border-bottom: 1px solid #E2E8F0;
            padding-bottom: 12px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .detail-label {
            color: #777777;
            font-weight: 500;
        }

        .detail-value {
            color: #111111;
            font-weight: bold;
        }

        .btn-reset {
            width: 100%;
            padding: 14px;
            background-color: var(--korail-blue);
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="header">KORAIL 승무원 휴대용 검수기</div>

<div class="scanner-container">
    <div class="camera-box">
        <div class="loading-text" id="loading">카메라 초기화 중...</div>
        <div id="reader"></div>
    </div>
</div>

<div id="result-card" class="verified-card">
    <div class="card-banner">✓ 정당 승차권 확인 완료</div>
    <div class="card-body">
        <div class="route-display" id="res-route">-</div>
        <div class="detail-row">
            <span class="detail-label">승객 성함</span>
            <span class="detail-value" id="res-name">-</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">지정 좌석</span>
            <span class="detail-value" id="res-seat">-</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">검증 상태</span>
            <span class="detail-value" style="color: var(--korail-green);">정상 승차</span>
        </div>
        <button class="btn-reset" onclick="resetScanner()">다음 티켓 확인</button>
    </div>
</div>

<div id="invalid-card" class="invalid-card">
    <div class="card-banner danger">✗ 유효하지 않은 승차권</div>
    <div class="card-body">
        <div class="route-display" style="color: var(--korail-red);">탑승 불가</div>
        <p style="text-align: center; color: #555; margin: 10px 0; font-size: 14px; line-height: 1.5;">
            보안 유효 시간(30초)이 경과하였거나,<br>
            위조된 불법 승차권으로 판독되었습니다.
        </p>
        <button class="btn-reset" style="background-color: var(--korail-red);" onclick="resetScanner()">다음 티켓 확인</button>
    </div>
</div>

<script>
    const SECRET_KEY = "KorailSecuritySystemKey2026";
    let html5Qrcode;

    function onScanSuccess(decodedText) {
        try {
            html5Qrcode.stop().then(() => {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('loading').innerText = '판독 진행 중...';
            });

            const bytes = CryptoJS.AES.decrypt(decodedText, SECRET_KEY);
            const decrypted = bytes.toString(CryptoJS.enc.Utf8);

            if (!decrypted) throw new Error();

            const [name, route, seat, timestampStr] = decrypted.split('|');
            const ticketTime = parseInt(timestampStr, 10);
            const currentTime = Date.now();

            if (isNaN(ticketTime) || (currentTime - ticketTime) > 30000) {
                showInvalidCard();
                return;
            }

            document.getElementById('res-name').innerText = name;
            document.getElementById('res-route').innerText = route;
            document.getElementById('res-seat').innerText = seat;

            document.getElementById('result-card').style.display = 'block';
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

        } catch (error) {
            showInvalidCard();
        }
    }

    function showInvalidCard() {
        document.getElementById('invalid-card').style.display = 'block';
        if (navigator.vibrate) navigator.vibrate(500); 
    }

    function startCamera() {
        document.getElementById('result-card').style.display = 'none';
        document.getElementById('invalid-card').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        document.getElementById('loading').innerText = '카메라 연결 중...';

        html5Qrcode = new Html5Qrcode("reader");

        html5Qrcode.start(
            { facingMode: "environment" }, 
            { fps: 15, qrbox: (width, height) => ({ width: width * 0.7, height: height * 0.7 }) },
            onScanSuccess,
            null
        ).then(() => {
            document.getElementById('loading').style.display = 'none';
        }).catch(err => {
            document.getElementById('loading').innerText = '카메라를 켤 수 없습니다.';
        });
    }

    function resetScanner() {
        startCamera();
    }

    window.addEventListener('DOMContentLoaded', startCamera);
</script>
</body>
</html>
