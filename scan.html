<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KORAIL - 승차권 검표 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --korail-blue: #0054A6;
            --bg-dark: #111827;
            --border-color: #374151;
            --success-green: #10B981;
            --error-red: #EF4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Noto Sans KR", sans-serif;
            background-color: var(--bg-dark);
            color: #FFFFFF;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .header {
            width: 100%;
            padding: 15px 0;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            background-color: #1F2937;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .scanner-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            max-width: 420px;
        }

        .scan-helper-text {
            font-size: 14px;
            color: #9CA3AF;
            margin-bottom: 20px;
            text-align: center;
            z-index: 10;
        }

        .qr-window {
            position: relative;
            width: 250px;
            height: 250px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background-color: #000000;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            overflow: hidden;
        }

        #reader {
            width: 100%;
            height: 100%;
        }

        #reader video {
            object-fit: cover !important;
        }

        .corner {
            position: absolute;
            width: 24px;
            height: 24px;
            border-color: var(--korail-blue);
            border-style: solid;
            pointer-events: none;
            z-index: 5;
        }
        .top-left { top: -2px; left: -2px; border-width: 4px 0 0 4px; }
        .top-right { top: -2px; right: -2px; border-width: 4px 4px 0 0; }
        .bottom-left { bottom: -2px; left: -2px; border-width: 0 0 4px 4px; }
        .bottom-right { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; }

        .status-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(17, 24, 39, 0.96);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 닫기 X 버튼 스타일 */
        .close-overlay-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 35px;
            font-weight: bold;
            color: #9CA3AF;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 1010;
        }

        .close-overlay-btn:hover {
            color: #FFFFFF;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--korail-blue);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        .info-card {
            background-color: #1F2937;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 320px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label { color: #9CA3AF; }
        .info-value { font-weight: bold; color: #FFFFFF; }

        .auto-close-timer {
            font-size: 14px;
            color: #9CA3AF;
            margin-top: 10px;
        }

        .test-panel {
            width: 100%;
            max-width: 420px;
            background-color: #1F2937;
            padding: 15px;
            box-sizing: border-box;
            border-top: 1px solid var(--border-color);
            text-align: center;
            z-index: 10;
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .test-input {
            flex: 1;
            padding: 12px;
            background-color: #111827;
            border: 1px solid var(--border-color);
            color: #FFFFFF;
            font-size: 13px;
            outline: none;
            border-radius: 6px;
        }

        .action-btn {
            padding: 0 15px;
            background-color: var(--korail-blue);
            color: #FFFFFF;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }

        .audio-guide-banner {
            background-color: #3B82F6;
            color: white;
            font-size: 11px;
            padding: 4px;
            width: 100%;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="audio-guide-banner" id="audio-banner">⚠️ 소리가 안 나면 화면 아무 곳이나 한 번 터치해 주세요!</div>
<div class="header">검표원 QR 스캐너</div>

<div class="scanner-container">
    <div class="scan-helper-text">스마트폰의 승차권 QR코드를<br>네모 테두리 화면 중앙에 맞추어 주세요.</div>
    
    <div class="qr-window">
        <div id="reader"></div>
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
    </div>
</div>

<div class="test-panel">
    <div class="input-row">
        <input type="text" class="test-input" id="test-qr-data" placeholder="암호화된 문자열을 복사해 넣으세요">
        <button class="action-btn" onclick="handleManualVerify()">검증</button>
    </div>
</div>

<div class="status-overlay" id="overlay">
    <span class="close-overlay-btn" onclick="resetScanner()">&times;</span>

    <div id="loading-view" style="display: flex; flex-direction: column; align-items: center;">
        <div class="spinner"></div>
        <div class="status-title">승차권 검증 중입니다...</div>
    </div>

    <div id="result-view" style="display: none; width: 100%; flex-direction: column; align-items: center;">
        <div class="status-title" id="result-title">정상 승차권</div>
        
        <div class="info-card">
            <div class="info-row">
                <span class="info-label">탑승객 명의</span>
                <span class="info-value" id="res-name">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">구간 정보</span>
                <span class="info-value" id="res-route">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">호차 / 좌석</span>
                <span class="info-value" id="res-seat">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">발행 검증시간</span>
                <span class="info-value" style="font-size: 11px;" id="res-time">-</span>
            </div>
        </div>

        <div class="auto-close-timer" id="timer-text">5초 후 스캐너로 복귀합니다...</div>
    </div>
</div>

<script>
    const SECRET_KEY = "KorailSecuritySystemKey2026";
    let audioCtx = null;
    let html5QrcodeScanner = null;
    let autoCloseTimeout = null;
    let autoCloseInterval = null;

    // 브라우저 소리 재생 제약 해제 유틸
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // 화면 터치 시 브라우저 오디오 차단 해제 바인딩
    document.body.addEventListener('click', function() {
        initAudio();
        document.getElementById('audio-banner').style.display = 'none'; // 한 번 터치하면 안내 배너 제거
    }, { once: false });

    function startCameraScanner() {
        html5QrcodeScanner = new Html5Qrcode("reader");
        const config = { 
            fps: 10, 
            qrbox: { width: 250, height: 250 } 
        };

        html5QrcodeScanner.start(
            { facingMode: "environment" }, 
            config,
            onScanSuccess
        ).catch(err => {
            console.warn("카메라 구동 실패 (수동 텍스트 검증을 활용하세요)", err);
        });
    }

    // 카메라 인식 즉시 반응
    function onScanSuccess(decodedText) {
        // [수정 사항] 정보가 표시되고 있는 도중이라도 즉시 새 QR 코드로 업데이트
        clearAllTimers();
        processVerification(decodedText);
    }

    // 수동 검증 버튼 실행
    function handleManualVerify() {
        initAudio();
        const inputData = document.getElementById('test-qr-data').value.trim();
        if (!inputData) {
            alert("암호화된 문자열을 입력해 주세요.");
            return;
        }
        clearAllTimers();
        processVerification(inputData);
    }

    function playBeep(frequency, duration) {
        try {
            initAudio();
            if (!audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = frequency;
            osc.type = "sine";
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch (e) {
            console.warn("오디오 출력 제약", e);
        }
    }

    function playSuccessBeep() {
        playBeep(980, 0.25);
    }

    function playErrorBeep() {
        playBeep(450, 0.12);
        setTimeout(() => playBeep(450, 0.12), 180);
        setTimeout(() => playBeep(400, 0.25), 360);
    }

    // 모든 대기 타이머 일괄 초기화 함수
    function clearAllTimers() {
        if (autoCloseTimeout) clearTimeout(autoCloseTimeout);
        if (autoCloseInterval) clearInterval(autoCloseInterval);
    }

    // 검증 메인 프로세스
    function processVerification(encryptedInput) {
        const overlay = document.getElementById('overlay');
        const loadingView = document.getElementById('loading-view');
        const resultView = document.getElementById('result-view');

        overlay.style.display = 'flex';
        loadingView.style.display = 'flex';
        resultView.style.display = 'none';

        // 분석 딜레이 연출 후 해독 결과 반영
        setTimeout(() => {
            loadingView.style.display = 'none';
            resultView.style.display = 'flex';

            try {
                const decryptedBytes = CryptoJS.AES.decrypt(encryptedInput, SECRET_KEY);
                const decryptedText = decryptedBytes.toString(CryptoJS.enc.Utf8);

                if (!decryptedText) throw new Error("복호화 에러");

                const [name, route, seat, timestamp] = decryptedText.split('|');
                
                const issuedTime = parseInt(timestamp);
                const now = Date.now();
                const diffSeconds = Math.floor((now - issuedTime) / 1000);

                // 엄격한 30초 한계 조건 적용
                if (diffSeconds > 30 || diffSeconds < -30) {
                    showErrorResult("보안 시간 만료 (30초 초과)");
                    return;
                }

                // 정상 처리
                playSuccessBeep();
                document.getElementById('result-title').innerText = "✓ 정상 승차권입니다";
                document.getElementById('result-title').style.color = "var(--success-green)";
                document.getElementById('res-name').innerText = name;
                document.getElementById('res-route').innerText = route;
                document.getElementById('res-seat').innerText = seat;
                document.getElementById('res-time').innerText = new Date(issuedTime).toLocaleString();

            } catch (e) {
                // 비정상 처리
                showErrorResult("위조되거나 변조된 잘못된 QR코드");
            }

            startAutoCloseTimer();
        }, 1000); // 1초 뒤 연산 표출
    }

    function showErrorResult(errorMessage) {
        playErrorBeep();
        document.getElementById('result-title').innerText = "✗ 잘못된 승차권입니다";
        document.getElementById('result-title').style.color = "var(--error-red)";
        document.getElementById('res-name').innerText = "검증 불가";
        document.getElementById('res-route').innerText = errorMessage;
        document.getElementById('res-seat').innerText = "탑승 불가";
        document.getElementById('res-time').innerText = "기록 없음";
    }

    // 5초 자동 스캐너 복구 타이머
    function startAutoCloseTimer() {
        clearAllTimers();
        
        let remainingSeconds = 5;
        document.getElementById('timer-text').innerText = `${remainingSeconds}초 후 스캐너로 복귀합니다...`;

        autoCloseInterval = setInterval(() => {
            remainingSeconds--;
            document.getElementById('timer-text').innerText = `${remainingSeconds}초 후 스캐너로 복귀합니다...`;
        }, 1000);

        autoCloseTimeout = setTimeout(() => {
            resetScanner();
        }, 5000);
    }

    // 화면 초기화 및 복귀
    function resetScanner() {
        clearAllTimers();
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('test-qr-data').value = '';
    }

    window.onload = function() {
        startCameraScanner();
    };
</script>
</body>
</html>
