<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KORAIL - 승차권 검표 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --korail-blue: #0054A6;
            --bg-dark: #111827;
            --border-color: #374151;
            --success-green: #10B981;
            --error-red: #EF4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Noto Sans KR", sans-serif;
            background-color: var(--bg-dark);
            color: #FFFFFF;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .header {
            width: 100%;
            padding: 15px 0;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            background-color: #1F2937;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .scanner-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            max-width: 420px;
        }

        .scan-helper-text {
            font-size: 14px;
            color: #9CA3AF;
            margin-bottom: 20px;
            text-align: center;
            z-index: 10;
        }

        .qr-window {
            position: relative;
            width: 250px;
            height: 250px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background-color: #000000;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            overflow: hidden;
        }

        #camera-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 모서리 가이드 (빨간선 제거됨) */
        .corner {
            position: absolute;
            width: 24px;
            height: 24px;
            border-color: var(--korail-blue);
            border-style: solid;
            pointer-events: none;
            z-index: 5;
        }
        .top-left {
            top: -2px;
            left: -2px;
            border-width: 4px 0 0 4px;
        }
        .top-right {
            top: -2px;
            right: -2px;
            border-width: 4px 4px 0 0;
        }
        .bottom-left {
            bottom: -2px;
            left: -2px;
            border-width: 0 0 4px 4px;
        }
        .bottom-right {
            bottom: -2px;
            right: -2px;
            border-width: 0 4px 4px 0;
        }

        .status-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(17, 24, 39, 0.95);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--korail-blue);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        .info-card {
            background-color: #1F2937;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 320px;
            margin-bottom: 25px;
            box-sizing: border-box;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label {
            color: #9CA3AF;
        }

        .info-value {
            font-weight: bold;
            color: #FFFFFF;
        }

        .btn-confirm {
            width: 100%;
            max-width: 320px;
            padding: 15px;
            background-color: var(--korail-blue);
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .test-panel {
            width: 100%;
            max-width: 420px;
            background-color: #1F2937;
            padding: 15px;
            box-sizing: border-box;
            border-top: 1px solid var(--border-color);
            text-align: center;
            z-index: 10;
        }

        .test-input {
            width: calc(100% - 30px);
            padding: 10px;
            background-color: #111827;
            border: 1px solid var(--border-color);
            color: #FFFFFF;
            font-size: 12px;
            outline: none;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .test-btn {
            background-color: #374151;
            color: #FFFFFF;
            border: none;
            padding: 8px 15px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
        }
        .test-btn:hover {
            background-color: var(--korail-blue);
        }
    </style>
</head>
<body>

<div class="header">검표원 QR 스캐너</div>

<div class="scanner-container">
    <div class="scan-helper-text">스마트폰의 승차권 QR코드를<br>네모 테두리 화면 중앙에 맞추어 주세요.</div>
    
    <div class="qr-window">
        <video id="camera-preview" autoplay playsinline muted></video>

        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
    </div>
</div>

<div class="test-panel">
    <input type="text" class="test-input" id="test-qr-data" placeholder="암호화된 문자열을 복사해 이곳에 입력하세요">
    <div>
        <button class="test-btn" onclick="triggerTestScan(true)">가상 인식 시도 (해독하기)</button>
        <button class="test-btn" style="background-color: #7F1D1D;" onclick="triggerTestScan(false)">오류 티켓 강제 테스트</button>
    </div>
</div>

<div class="status-overlay" id="overlay">
    <div id="loading-view" style="display: flex; flex-direction: column; align-items: center;">
        <div class="spinner"></div>
        <div class="status-title">안전한 채널을 통해 조회 중입니다...</div>
    </div>

    <div id="result-view" style="display: none; width: 100%; flex-direction: column; align-items: center;">
        <div class="status-title" id="result-title">정상 승차권</div>
        
        <div class="info-card">
            <div class="info-row">
                <span class="info-label">탑승객 명의</span>
                <span class="info-value" id="res-name">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">구간 정보</span>
                <span class="info-value" id="res-route">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">호차 / 좌석</span>
                <span class="info-value" id="res-seat">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">발행 검증시간</span>
                <span class="info-value" style="font-size: 11px;" id="res-time">-</span>
            </div>
        </div>

        <button class="btn-confirm" onclick="resetScanner()">확인 (스캐너 복귀)</button>
    </div>
</div>

<script>
    const SECRET_KEY = "KorailSecuritySystemKey2026";
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    async function initCamera() {
        const video = document.getElementById('camera-preview');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" },
                audio: false
            });
            video.srcObject = stream;
        } catch (err) {
            console.warn("카메라 장치 권한 없음 (로컬 테스트 환경)", err);
        }
    }

    function playBeep(frequency, duration) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = frequency;
        osc.type = "sine";
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function playErrorBeep() {
        playBeep(450, 0.12);
        setTimeout(() => playBeep(450, 0.12), 200);
        setTimeout(() => playBeep(400, 0.25), 400);
    }

    function triggerTestScan(isNormalMode) {
        const encryptedInput = document.getElementById('test-qr-data').value.trim();

        if (isNormalMode && !encryptedInput) {
            alert("ticket.html에서 노출된 암호화 텍스트(예: U2FsdGVk...)를 복사해 넣어주세요.");
            return;
        }

        playBeep(980, 0.15);

        const overlay = document.getElementById('overlay');
        const loadingView = document.getElementById('loading-view');
        const resultView = document.getElementById('result-view');

        overlay.style.display = 'flex';
        loadingView.style.display = 'flex';
        resultView.style.display = 'none';

        setTimeout(() => {
            loadingView.style.display = 'none';
            resultView.style.display = 'flex';

            if (isNormalMode) {
                try {
                    // 순수 AES 해독 시도
                    const decryptedBytes = CryptoJS.AES.decrypt(encryptedInput, SECRET_KEY);
                    const decryptedText = decryptedBytes.toString(CryptoJS.enc.Utf8);

                    if (!decryptedText) throw new Error("복호화 에러");

                    const [name, route, seat, timestamp] = decryptedText.split('|');
                    
                    const issuedTime = parseInt(timestamp);
                    const now = Date.now();
                    const diffSeconds = Math.floor((now - issuedTime) / 1000);

                    // 30초 유효시간 체크
                    if (diffSeconds > 30 || diffSeconds < -30) {
                        triggerErrorScreen("보안 시간 만료 (30초 초과)");
                        return;
                    }

                    document.getElementById('result-title').innerText = "✓ 정상 승차권입니다";
                    document.getElementById('result-title').style.color = "var(--success-green)";
                    document.getElementById('res-name').innerText = name;
                    document.getElementById('res-route').innerText = route;
                    document.getElementById('res-seat').innerText = seat;
                    document.getElementById('res-time').innerText = new Date(issuedTime).toLocaleString();

                } catch (e) {
                    triggerErrorScreen("위조되거나 변조된 잘못된 QR코드");
                }
            } else {
                triggerErrorScreen("잘못된 승차권 정보");
            }
        }, 3000);
    }

    function triggerErrorScreen(errorMessage) {
        playErrorBeep();

        document.getElementById('result-title').innerText = "✗ 잘못된 QR코드입니다";
        document.getElementById('result-title').style.color = "var(--error-red)";
        document.getElementById('res-name').innerText = "검증 불가";
        document.getElementById('res-route').innerText = errorMessage;
        document.getElementById('res-seat').innerText = "탑승 불가";
        document.getElementById('res-time').innerText = "기록 없음";
    }

    function resetScanner() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('test-qr-data').value = '';
    }

    window.onload = function() {
        initCamera();
    };
</script>
</body>
</html>
